name: C/C++ CI || module fadliwiryawirawanwan S.kom M.S.I 

on:
  push:
    branches: [ "openbussiness-Banking-random" ]
  pull_request:
    branches: [ "M-banking" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: configure
      run: ./configure
    - name: make
      run: make
    - name: make check
      run: make check
    - name: make distcheck
      run: make distcheck
